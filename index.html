<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEEK 12 Exercise: Lydia Ahn</title>
    <style>

        .box {
            width: 200px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
            background-color: rgb(184, 207, 253);
            font-family: "Poppins", sans-serif;
            font-size: 18px;
        }

    </style>
</head>


    <div id="greeting" class="box" onclick="changeBoxHTML('#greeting', 'You clicked me c:')">Hello!</div>

    <script>

    function changeBoxHTML(selector, innerHTML) {
        var box = document.querySelector(selector);
        box.innerHTML = innerHTML;
    }

    changeBoxHTML("#greeting", "Welcome to Week 12!");

    </script>
